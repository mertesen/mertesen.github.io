<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels Envanterim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🏎️ Hot Wheels Envanterim</h1>
        <input type="text" id="searchInput" placeholder="Model, seri veya STH/TH ara...">
    </header>
    <select id="sortSelect" style="padding: 10px; border-radius: 8px; margin-top: 10px;">
        <option value="newest">Yeniden Eskiye (2026 -> 2010)</option>
        <option value="oldest">Eskiden Yeniye (2010 -> 2026)</option>
    </select>

    <main>
        <section class="koleksiyon-alani">
            <h2>⭐ Benim Koleksiyonum</h2>
            <div id="collectionGrid" class="car-grid">
                </div>
        </section>

        <hr>

        <section class="katalog-alani">
            <h2>📚 Tüm Katalog</h2>
            <div id="catalogGrid" class="car-grid"></div>
            <div style="text-align: center; margin-top: 20px;">
            <button id="loadMoreBtn" class="btn-add" style="display:none;">Daha Fazla Göster...</button>
        </section>

    </div>
</section>
    </main>

    <script src="cars/2010.js"></script>
    <script src="cars/2011.js"></script>
    <script src="cars/2012.js"></script>
    <script src="cars/2013.js"></script>
    <script src="cars/2014.js"></script>
    <script src="cars/2015.js"></script>
    <script src="cars/2016.js"></script>
    <script src="cars/2017.js"></script>
    <script src="cars/2018.js"></script>
    <script src="cars/2019.js"></script>
    <script src="cars/2020.js"></script>
    <script src="cars/2021.js"></script>
    <script src="cars/2022.js"></script>
    <script src="cars/2023.js"></script>
    <script src="cars/2024.js"></script>
    <script src="cars/2025.js"></script>
    <script src="cars/2026.js"></script>
    <script src="app.js"></script>
</body>
</html>
