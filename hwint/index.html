<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels Envanterim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🏎️ Hot Wheels Envanterim</h1>
        <div class="header-actions">
            <button id="viewToggle" class="btn-action" title="Görünümü Değiştir">🖼️</button>
            <button id="themeToggle" class="btn-action" title="Temayı Değiştir">🌙</button>
        </div>
        <input type="text" id="searchInput" placeholder="Model, Seri, Toy ID veya Sürüm ara...">
        
        <div class="filters-container">
            <select id="yearSelect" class="filter-select">
                <option value="all">Tüm Yıllar</option>
            </select>

            <select id="seriesSelect" class="filter-select">
                <option value="all">Tüm Seriler</option>
            </select>
        
            <select id="releaseSelect" class="filter-select">
                <option value="all">Tüm Sürümler (Release)</option>
            </select>

            <select id="typeSelect" class="filter-select">
                <option value="all">Tüm Koleksiyon Tipleri</option>
                <option value="mainline">Mainline</option>
                <option value="premium">Premium</option>
            </select>

            <select id="raritySelect" class="filter-select">
                <option value="all">Tüm Nadirlik Seviyeleri</option>
                <option value="normal">Normal</option>
                <option value="th">Treasure Hunt (TH)</option>
                <option value="sth">Super Treasure Hunt (STH)</option>
                <option value="premium">Premium</option>
                <option value="chase">Chase</option>
            </select>

            <select id="sortSelect" class="filter-select">
                <option value="newest">Yeniden Eskiye</option>
                <option value="oldest">Eskiden Yeniye</option>
            </select>
        </div>
    </header>

    <main>
        <section class="koleksiyon-alani">
            <div class="koleksiyon-header">
                <h2 onclick="toggleCollection()" style="cursor: pointer; margin: 0; flex-grow: 1;">
                    ⭐ Benim Koleksiyonum (<span id="collectionCount">0</span>) <span id="toggleIcon">🔽</span>
                </h2>
                <div class="data-actions">
                    <button class="btn-export" onclick="exportCollection()">📥 Dışa Aktar</button>
                    <label class="btn-import">
                        📤 İçe Aktar
                        <input type="file" id="importFile" accept=".json" style="display: none;">
                    </label>
                </div>
            </div>
            
            <div id="collectionWrapper" style="display: none; margin-top: 20px;">
                <div id="statsContainer"></div>
                <div id="setTrackerContainer"></div>
                <div id="collectionGrid" class="car-grid"></div>
            </div>
        </section>

        <hr>

        <section class="wishlist-alani">
            <div class="koleksiyon-header">
                <h2 onclick="toggleWishlist()" style="cursor: pointer; margin: 0; flex-grow: 1;">
                    ❤️ İstek Listem (<span id="wishlistCount">0</span>) <span id="wishToggleIcon">🔽</span>
                </h2>
            </div>
            <div id="wishlistWrapper" style="display: none; margin-top: 20px;">
                <div id="wishlistGrid" class="car-grid"></div>
            </div>
        </section>

<section class="katalog-alani">
            <h2>📚 Tüm Katalog</h2>
            <div id="catalogGrid" class="car-grid"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button id="loadMoreBtn" class="btn-add" style="display:none;">Daha Fazla Göster...</button>
            </div>
        </section>
    </main>

    <script src="cars/mainline/2010.js"></script>
    <script src="cars/mainline/2011.js"></script>
    <script src="cars/mainline/2012.js"></script>
    <script src="cars/mainline/2013.js"></script>
    <script src="cars/mainline/2014.js"></script>
    <script src="cars/mainline/2015.js"></script>
    <script src="cars/mainline/2016.js"></script>
    <script src="cars/mainline/2017.js"></script>
    <script src="cars/mainline/2018.js"></script>
    <script src="cars/mainline/2019.js"></script>
    <script src="cars/mainline/2020.js"></script>
    <script src="cars/mainline/2021.js"></script>
    <script src="cars/mainline/2022.js"></script>
    <script src="cars/mainline/2023.js"></script>
    <script src="cars/mainline/2024.js"></script>
    <script src="cars/mainline/2025.js"></script>
    <script src="cars/mainline/2026.js"></script>

    <script src="cars/premium/car_culture/2016.js"></script>
    <script src="cars/premium/car_culture/2017.js"></script>
    <script src="cars/premium/car_culture/2018.js"></script>
    <script src="cars/premium/car_culture/2019.js"></script>
    <script src="cars/premium/car_culture/2020.js"></script>
    <script src="cars/premium/car_culture/2021.js"></script>
    <script src="cars/premium/car_culture/2022.js"></script>
    <script src="cars/premium/car_culture/2023.js"></script>
    <script src="cars/premium/car_culture/2024.js"></script>
    <script src="cars/premium/car_culture/2025.js"></script>
    <script src="cars/premium/car_culture/2026.js"></script>

    <script src="cars/premium/pop_culture/2013.js"></script>
    <script src="cars/premium/pop_culture/2014.js"></script>
    <script src="cars/premium/pop_culture/2015.js"></script>
    <script src="cars/premium/pop_culture/2016.js"></script>
    <script src="cars/premium/pop_culture/2017.js"></script>
    <script src="cars/premium/pop_culture/2018.js"></script>
    <script src="cars/premium/pop_culture/2019.js"></script>
    <script src="cars/premium/pop_culture/2020.js"></script>
    <script src="cars/premium/pop_culture/2021.js"></script>
    <script src="cars/premium/pop_culture/2022.js"></script>
    <script src="cars/premium/pop_culture/2023.js"></script>
    <script src="cars/premium/pop_culture/2024.js"></script>
    <script src="cars/premium/pop_culture/2025.js"></script>
    <script src="cars/premium/pop_culture/2026.js"></script>

    <script src="app.js"></script>
</body>
</html>
